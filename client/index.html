<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safari 26.4 WebTransport bidi hang reproducer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; padding: 24px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 1.35rem; margin-bottom: 18px; color: #58a6ff; }
  h2 { font-size: 0.9rem; margin-bottom: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
  label { display: block; font-size: 0.85rem; color: #8b949e; margin-bottom: 4px; }
  input[type="text"] {
    width: 100%; padding: 8px 12px; background: #0d1117; border: 1px solid #30363d;
    border-radius: 6px; color: #e1e4e8; font-family: monospace; font-size: 0.9rem; margin-bottom: 10px;
  }
  input:focus { outline: none; border-color: #58a6ff; }
  .row { display: flex; gap: 10px; align-items: flex-end; }
  .row input { flex: 1; margin-bottom: 0; }
  button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.85rem; cursor: pointer; font-weight: 500; }
  .btn-primary { background: #238636; color: #fff; }
  .btn-send { background: #1f6feb; color: #fff; }
  .btn-danger { background: #da3633; color: #fff; }
  button:disabled { opacity: 0.4; cursor: default; }
  .status { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; margin-left: 10px; }
  .status-disconnected { background: #3d1f20; color: #f85149; }
  .status-connecting { background: #3d2f00; color: #d29922; }
  .status-connected { background: #1a3a2a; color: #3fb950; }
  .tests { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  #log { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; height: 240px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.5; }
  .log-time { color: #484f58; }
  .log-info { color: #58a6ff; }
  .log-send { color: #3fb950; }
  .log-recv { color: #d2a8ff; }
  .log-error { color: #f85149; }
  .log-warn { color: #d29922; }
  .response { margin-top: 8px; padding: 8px; background: #0d1117; border-radius: 4px; font-family: monospace; font-size: 0.85rem; min-height: 32px; color: #d2a8ff; word-break: break-all; }
</style>
</head>
<body>

<h1>Safari 26.4 WebTransport bidi hang reproducer</h1>

<div class="panel">
  <h2>Connection <span id="status" class="status status-disconnected">Disconnected</span></h2>
  <label for="url">Server URL</label>
  <input type="text" id="url" value="https://127.0.0.1:4436/wt">
  <label for="hash">Certificate SHA-256 (hex) — leave empty for CA-trusted cert</label>
  <input type="text" id="hash" placeholder="(optional) paste hex hash printed by server/run.sh">
  <div style="display:flex;gap:10px;margin-top:4px;">
    <button id="btnConnect" class="btn-primary" onclick="doConnect()">Connect</button>
    <button id="btnDisconnect" class="btn-danger" onclick="doDisconnect()" disabled>Disconnect</button>
  </div>
</div>

<div class="tests">
  <div class="panel">
    <h2>Bidi stream (the hang)</h2>
    <div class="row">
      <input type="text" id="bidiMsg" value="hello">
      <button id="btnBidi" class="btn-send" onclick="sendBidi()" disabled>Send</button>
    </div>
    <div class="response" id="bidiResp">&mdash;</div>
  </div>
  <div class="panel">
    <h2>Datagram (works)</h2>
    <div class="row">
      <input type="text" id="dgMsg" value="hello">
      <button id="btnDg" class="btn-send" onclick="sendDatagram()" disabled>Send</button>
    </div>
    <div class="response" id="dgResp">&mdash;</div>
  </div>
</div>

<div class="panel">
  <h2>Event log</h2>
  <div id="log"></div>
</div>

<script>
let transport = null;

function log(msg, cls = 'info') {
  const el = document.getElementById('log');
  const d = new Date();
  const t = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0') + '.' + String(d.getMilliseconds()).padStart(3, '0');
  el.innerHTML += `<div><span class="log-time">${t}</span> <span class="log-${cls}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function setStatus(s) {
  const el = document.getElementById('status');
  el.textContent = s.charAt(0).toUpperCase() + s.slice(1);
  el.className = 'status status-' + s;
}

function setConnected(connected) {
  document.getElementById('btnConnect').disabled = connected;
  document.getElementById('btnDisconnect').disabled = !connected;
  document.getElementById('btnBidi').disabled = !connected;
  document.getElementById('btnDg').disabled = !connected;
}

function hexToBytes(hex) {
  hex = hex.replace(/\s+/g, '');
  const bytes = new Uint8Array(hex.length / 2);
  for (let i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16);
  return bytes;
}

async function doConnect() {
  const url = document.getElementById('url').value.trim();
  const hashHex = document.getElementById('hash').value.trim();

  let options;
  if (hashHex === '') {
    options = undefined;
  } else if (hashHex.length === 64) {
    options = { serverCertificateHashes: [{ algorithm: 'sha-256', value: hexToBytes(hashHex).buffer }] };
  } else {
    log('Certificate hash, when provided, must be 64 hex characters.', 'error');
    return;
  }

  setStatus('connecting');
  log(`connecting to ${url} (${options ? 'pinned cert hash' : 'CA trust'})...`);
  const t0 = performance.now();
  try {
    transport = options ? new WebTransport(url, options) : new WebTransport(url);
    transport.closed.then(() => {
      log('Connection closed', 'warn');
      setStatus('disconnected'); setConnected(false); transport = null;
    }).catch(err => {
      log(`Connection closed with error: ${err}`, 'error');
      setStatus('disconnected'); setConnected(false); transport = null;
    });
    await transport.ready;
    const elapsed = (performance.now() - t0).toFixed(1);
    setStatus('connected'); setConnected(true);
    log(`connected in ${elapsed}ms`, 'info');
    readDatagrams();
    readIncomingStreams();
  } catch (err) {
    log(`Connection failed: ${err}`, 'error');
    setStatus('disconnected'); setConnected(false); transport = null;
  }
}

async function doDisconnect() {
  if (transport) { try { transport.close(); } catch {} transport = null; }
  setStatus('disconnected'); setConnected(false);
  log('Disconnected');
}

async function sendBidi() {
  if (!transport) return;
  const msg = document.getElementById('bidiMsg').value;
  document.getElementById('bidiResp').textContent = 'waiting...';
  log(`→ Bidi: "${msg}"`, 'send');
  try {
    const stream = await transport.createBidirectionalStream();
    const writer = stream.writable.getWriter();
    const reader = stream.readable.getReader();
    await writer.write(new TextEncoder().encode(msg));
    writer.close().catch(() => {});
    // Read the first chunk and report immediately. Some echo servers (aioquic's
    // demo in particular) don't close the response side of the bidi stream —
    // so waiting for `done` would hang even on a working browser. One chunk is
    // enough to prove the echo.
    const { value } = await reader.read();
    const response = value ? new TextDecoder().decode(value) : '';
    document.getElementById('bidiResp').textContent = response;
    log(`← Bidi: "${response}"`, 'recv');
  } catch (err) {
    log(`Bidi error: ${err}`, 'error');
    document.getElementById('bidiResp').textContent = 'Error: ' + err;
  }
}

async function sendDatagram() {
  if (!transport) return;
  const msg = document.getElementById('dgMsg').value;
  document.getElementById('dgResp').textContent = 'waiting...';
  log(`→ Datagram: "${msg}"`, 'send');
  try {
    const writable = transport.datagrams.writable ?? transport.datagrams.createWritable();
    const writer = writable.getWriter();
    await writer.write(new TextEncoder().encode(msg));
    writer.releaseLock();
  } catch (err) {
    log(`Datagram error: ${err}`, 'error');
  }
}

async function readDatagrams() {
  if (!transport) return;
  try {
    const reader = transport.datagrams.readable.getReader();
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      const text = new TextDecoder().decode(value);
      document.getElementById('dgResp').textContent = text;
      log(`← Datagram: "${text}"`, 'recv');
    }
  } catch {}
}

async function readIncomingStreams() {
  if (!transport) return;
  try {
    const reader = transport.incomingBidirectionalStreams.getReader();
    while (true) {
      const { value: stream, done } = await reader.read();
      if (done) break;
      handleIncomingStream(stream);
    }
  } catch {}
}

async function handleIncomingStream(stream) {
  try {
    const reader = stream.readable.getReader();
    let data = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      data += new TextDecoder().decode(value);
    }
    log(`← Server-initiated stream: "${data}"`, 'recv');
  } catch {}
}
</script>
</body>
</html>
